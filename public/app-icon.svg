<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#31102f" />
    </linearGradient>

    <!-- Shield Gold Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef08a" />
      <stop offset="50%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>

    <!-- Character Gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f1f5f9" />
    </linearGradient>

    <!-- Heart Gradient -->
    <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff4d6d" />
      <stop offset="100%" stop-color="#c9184a" />
    </linearGradient>
  </defs>

  <!-- SOLID FULL BLEED BACKGROUND (NO TRANSPARENCY SO IOS DOESN'T FILL BLACK) -->
  <rect width="512" height="512" fill="url(#bgGrad)" />

  <!-- DECORATIVE EMBOSSED INNER SHIELD -->
  <rect x="36" y="36" width="440" height="440" rx="96" fill="none" stroke="url(#goldGrad)" stroke-width="12" opacity="0.4" />
  
  <!-- MAIN SHIELD CONTAINER -->
  <rect x="64" y="64" width="384" height="384" rx="80" fill="#1e293b" stroke="url(#goldGrad)" stroke-width="16" />

  <!-- BRIGHT GOLDEN ACCENT INNER RIM -->
  <rect x="80" y="80" width="352" height="352" rx="64" fill="none" stroke="#f59e0b" stroke-width="4" opacity="0.6" />

  <!-- CHINESE CHARACTER '漢' (HAN - CHINESE LANGUAGE) -->
  <text x="256" y="325" font-family="'Noto Serif SC', 'Ma Shan Zheng', 'KaiTi', 'SimSun', serif" font-size="210" font-weight="900" text-anchor="middle" fill="url(#textGrad)">漢</text>

  <!-- FLOATING MINI RED HEART ON TOP RIGHT -->
  <path d="M 360,110 C 360,85 335,70 315,90 C 295,70 270,85 270,110 C 270,140 315,165 315,165 C 315,165 360,140 360,110 Z" fill="url(#heartGrad)" stroke="#ffffff" stroke-width="6" />

  <!-- SPARKLE GOLD STAR ON BOTTOM LEFT -->
  <polygon points="140,360 148,380 170,380 152,392 158,412 140,400 122,412 128,392 110,380 132,380" fill="#fbbf24" stroke="#ffffff" stroke-width="3" />

  <!-- SUBTITLE 'ATELIER HSK' AT BOTTOM -->
  <text x="256" y="420" font-family="sans-serif" font-size="32" font-weight="900" text-anchor="middle" fill="#fbbf24" letter-spacing="4">ATELIER HSK</text>
</svg>
