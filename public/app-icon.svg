<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Vibrant Cyan Blue Gradient -->
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0284c7" />
    </linearGradient>

    <!-- Vibrant Amber Gold Gradient -->
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
  </defs>

  <!-- Card 1: Clean Cyan Blue Card Behind (No H letter) -->
  <rect x="4" y="6" width="38" height="38" rx="11" fill="url(#cyanGrad)" />

  <!-- Card 2: Amber Gold Card Overlapping in Front with letter V -->
  <rect x="20" y="18" width="40" height="40" rx="12" fill="url(#amberGrad)" stroke="#ffffff" stroke-width="2.5" />
  <text x="40" y="45" font-family="'Outfit', 'Inter', system-ui, sans-serif" font-weight="900" font-size="24" fill="#ffffff" text-anchor="middle">v</text>
</svg>
