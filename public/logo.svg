<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f43f5e" />
      <stop offset="100%" stop-color="#fb7185" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    <linearGradient id="charGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#818cf8" />
    </linearGradient>
  </defs>

  <!-- ICON BACKGROUND SHIELD WITH HIGH CONTRAST BORDER -->
  <rect x="28" y="28" width="200" height="200" rx="44" fill="#1e293b" stroke="url(#goldGrad)" stroke-width="8" />

  <!-- Stylized Modern HSK Chinese Character in Vibrant Sky-Blue/Indigo Gradient -->
  <g transform="translate(128, 118)">
    <text x="0" y="32" font-family="'Inter', 'Space Grotesk', system-ui, sans-serif" font-weight="900" font-size="110" fill="url(#charGrad)" text-anchor="middle">漢</text>
  </g>

  <!-- Glowing Heart Top Accent -->
  <path d="M192 36 C184 24, 167 24, 167 36 C167 48, 192 66, 192 66 C192 66, 217 48, 217 36 C207 24, 200 24, 192 36 Z" fill="url(#logoGrad)" />
  
  <!-- Architectural Golden Star / Sparkle Accent -->
  <path d="M210 160 L214 172 L226 176 L214 180 L210 192 L206 180 L194 176 L206 172 Z" fill="url(#goldGrad)" />

  <!-- Modern Clean Typography Below -->
  <text x="128" y="210" font-family="'Inter', 'Space Grotesk', sans-serif" font-weight="800" font-size="16" fill="#f8fafc" text-anchor="middle" letter-spacing="3">ATELIER HSK</text>
</svg>
