<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" shape-rendering="crispEdges">
  <defs>
    <!-- Gradient Vang Kim Son Son -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef08a" />
      <stop offset="50%" stop-color="#facc15" />
      <stop offset="100%" stop-color="#eab308" />
    </linearGradient>
    <!-- Gradient Do Son Hoang Gia -->
    <linearGradient id="stampGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f43f5e" />
      <stop offset="100%" stop-color="#be123c" />
    </linearGradient>
  </defs>

  <!-- Nen The Neo-Brutalism Bo Goc Vang Ho Phach -->
  <rect x="16" y="16" width="480" height="480" rx="64" fill="#fbbf24" stroke="#1f2937" stroke-width="24" />
  
  <!-- Vien Trong Nen Trang Kem Noi Bat -->
  <rect x="44" y="44" width="424" height="424" rx="48" fill="#fffaf0" stroke="#1f2937" stroke-width="16" />

  <!-- DAU AN DO SON HOANG GIA (IMPERIAL SEAL STAMP) -->
  <rect x="96" y="96" width="320" height="320" rx="40" fill="url(#stampGrad)" stroke="#1f2937" stroke-width="20" />
  
  <!-- Vien Trong Doi Noi Net Khac Hoa Van -->
  <rect x="118" y="118" width="276" height="276" rx="28" fill="none" stroke="#fef2f2" stroke-width="8" stroke-dasharray="20,10" />

  <!-- HOA TIET MAY TUONG VAN CO PHONG PIXEL (4 GOC CON DAU) -->
  <path d="M128 140 h20 v-12 h12 v20 h-32 z" fill="#fef2f2" opacity="0.8" />
  <path d="M384 140 h-20 v-12 h-12 v20 h32 z" fill="#fef2f2" opacity="0.8" />
  <path d="M128 372 h20 v12 h12 v-20 h-32 z" fill="#fef2f2" opacity="0.8" />
  <path d="M384 372 h-20 v12 h-12 v-20 h32 z" fill="#fef2f2" opacity="0.8" />

  <!-- CACH DIEU NGHE THUAT: CHU LAN VY PHONG CACH AN CHUONG TICH HOP PIXEL -->
  
  <!-- NUA TREN: CACH DIEU CHU LAN -->
  <g stroke="#1f2937" stroke-width="10" paint-order="stroke fill">
    <!-- Net Chu L (Mai Co Phong) -->
    <path d="M150 160 v80 h50" fill="none" stroke="#ffffff" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Net Chu A (Co Trai Tim Pixel O Giua) -->
    <path d="M215 240 L240 160 L265 240 M224 215 h32" fill="none" stroke="url(#goldGrad)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Net Chu N (Tuong Van Uon Net) -->
    <path d="M285 240 V160 L335 240 V160" fill="none" stroke="#ffffff" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- TRAI TIM PIXEL DO DAU O TAM CHU A -->
  <path d="M240 190 C235 180, 222 180, 222 190 C222 200, 240 212, 240 212 C240 212, 258 200, 258 190 C258 180, 245 180, 240 190 Z" fill="#f43f5e" stroke="#1f2937" stroke-width="6" />

  <!-- NUA DUOI: CACH DIEU CHU VY TAO HINH VUONG MIEN & HOA SEN PIXEL -->
  <g stroke="#1f2937" stroke-width="10" paint-order="stroke fill">
    <!-- Chu V (Tao hinh Canh Thap Hoa) -->
    <path d="M175 270 L210 335 L245 270" fill="none" stroke="url(#goldGrad)" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Chu Y (Vuon Net Cao Dep) -->
    <path d="M275 270 L305 305 V338 M335 270 L305 305" fill="none" stroke="#ffffff" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- BANNER NOI BAT: DAU AN LAN VY • HSK ATELIER -->
  <rect x="130" y="348" width="252" height="44" rx="14" fill="#fbbf24" stroke="#1f2937" stroke-width="10" />
  <text x="256" y="377" font-family="'Space Grotesk', sans-serif" font-weight="900" font-size="17" fill="#1f2937" text-anchor="middle" letter-spacing="2">LAN VY • HSK ATELIER</text>

  <!-- NGOI SAO LAP LANH NEO-BRUTALISM -->
  <polygon points="420,70 432,98 460,102 438,120 444,148 420,132 396,148 402,120 380,102 408,98" fill="url(#goldGrad)" stroke="#1f2937" stroke-width="10" />
</svg>
