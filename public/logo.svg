<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Premium Gradient Background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    
    <!-- Accent Gradient for HSK Blue & Orange -->
    <linearGradient id="blueCardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0284c7" />
    </linearGradient>

    <linearGradient id="orangeRibbonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb923c" />
      <stop offset="100%" stop-color="#f43f5e" />
    </linearGradient>
  </defs>

  <!-- Modern Squircle Shield Badge Base -->
  <rect x="2" y="2" width="60" height="60" rx="18" fill="url(#bgGrad)" stroke="#334155" stroke-width="2" />

  <!-- Back Floating Flashcard Accent (Blue) -->
  <rect x="12" y="10" width="36" height="42" rx="10" fill="url(#blueCardGrad)" opacity="0.9" />

  <!-- Front Floating Card Notch Overlay (Orange Ribbon V) -->
  <path d="M38 10 L44 10 C46.2 10 48 11.8 48 14 L48 28 L43 24 L38 28 Z" fill="url(#orangeRibbonGrad)" />

  <!-- Stylized Modern HSK Chinese Character (漢) in crisp white -->
  <text x="30" y="38" font-family="'Inter', 'Space Grotesk', system-ui, sans-serif" font-weight="900" font-size="22" fill="#ffffff" text-anchor="middle" letter-spacing="-0.5">漢</text>

  <!-- Small Minimalist Sparkle / Star at Bottom Left -->
  <circle cx="20" cy="43" r="1.8" fill="#fbbf24" />
</svg>
