<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" shape-rendering="crispEdges">
  <!-- THẺ XANH DƯƠNG PHÍA SAU (BACK FLASHCARD TILE) -->
  <rect x="72" y="72" width="310" height="310" rx="48" fill="#3b82f6" stroke="#1f2937" stroke-width="20" />
  
  <!-- THẺ VÀNG HỔ PHÁCH PHÍA TRƯỚC (FRONT FLASHCARD TILE) -->
  <rect x="130" y="130" width="310" height="310" rx="48" fill="#fbbf24" stroke="#1f2937" stroke-width="20" />

  <!-- NỘI DUNG THẺ TRUNG TÂM: CHỮ HÁN "漢" VÀ CHỮ "HSK" TO RÕ MINIMALIST -->
  <g fill="#1f2937">
    <!-- CHỮ HÁN "漢" (HÀN - HSK) CHUẨN MINIMALIST -->
    <text x="285" y="305" font-family="'Fraunces', 'Space Grotesk', serif" font-weight="900" font-size="140" text-anchor="middle">漢</text>
  </g>

  <!-- TRÁI TIM PIXEL NHỎ XINH Ở GÓC THẺ -->
  <path d="M380 170 C370 155, 348 155, 348 170 C348 185, 380 205, 380 205 C380 205, 412 185, 412 170 C412 155, 390 155, 380 170 Z" fill="#ef4444" stroke="#1f2937" stroke-width="6" />

  <!-- DECORATIVE DOTS NEO-BRUTALISM -->
  <circle cx="170" cy="170" r="10" fill="#1f2937" />
</svg>
