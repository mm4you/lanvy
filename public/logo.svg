<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Premium Gradient Background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    
    <!-- Accent Gradient for HSK Blue -->
    <linearGradient id="blueCardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0284c7" />
    </linearGradient>
  </defs>

  <!-- Modern Squircle Shield Badge Base -->
  <rect x="2" y="2" width="60" height="60" rx="18" fill="url(#bgGrad)" stroke="#334155" stroke-width="2" />

  <!-- Clean Floating Flashcard (Blue) -->
  <rect x="12" y="10" width="40" height="44" rx="12" fill="url(#blueCardGrad)" />

  <!-- Stylized Modern HSK Chinese Character (漢) in crisp white -->
  <text x="32" y="40" font-family="'Inter', 'Space Grotesk', system-ui, sans-serif" font-weight="900" font-size="24" fill="#ffffff" text-anchor="middle" letter-spacing="-0.5">漢</text>

  <!-- Small Minimalist Sparkle Accent -->
  <circle cx="20" cy="45" r="2" fill="#fbbf24" />
</svg>
