<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" shape-rendering="crispEdges">
  {/* Nền Thẻ Neo-Brutalism Bo Góc Vàng Hổ Phách */}
  <rect x="16" y="16" width="480" height="480" rx="64" fill="#fbbf24" stroke="#1f2937" stroke-width="24" />
  
  {/* Viền Trong Nền Trắng Kem */}
  <rect x="44" y="44" width="424" height="424" rx="48" fill="#fffaf0" stroke="#1f2937" stroke-width="16" />

  {/* DẤU ẤN ĐỎ HOÀNG GIA (IMPERIAL SEAL STAMP) */}
  <rect x="96" y="96" width="320" height="320" rx="36" fill="#e11d48" stroke="#1f2937" stroke-width="20" />
  {/* Viền Nối Đôi Cổ Phong */}
  <rect x="116" y="116" width="280" height="280" rx="24" fill="none" stroke="#fef2f2" stroke-width="10" stroke-dasharray="24,12" />

  {/* DÒNG CHỮ TIẾNG VIỆT TO RÕ: LAN VY (NEO-BRUTALIST PIXEL ART) */}
  <g fill="#ffffff" stroke="#1f2937" stroke-width="10" paint-order="stroke fill">
    {/* Chữ LAN */}
    <text x="256" y="215" font-family="'Space Grotesk', sans-serif" font-weight="900" font-size="64" text-anchor="middle" letter-spacing="4">LAN</text>
    {/* Chữ VY */}
    <text x="256" y="285" font-family="'Space Grotesk', sans-serif" font-weight="900" font-size="72" fill="#fef08a" text-anchor="middle" letter-spacing="6">VY</text>
  </g>

  {/* TRÁI TIM PIXEL TÌNH YÊU NỔI BẬT GIỮA CHỮ */}
  <path d="M256 125 C246 110, 224 110, 224 125 C224 140, 256 160, 256 160 C256 160, 288 140, 288 125 C288 110, 266 110, 256 125 Z" fill="#f43f5e" stroke="#1f2937" stroke-width="8" />

  {/* BANNER DẤU ẤN HSK ATELIER (VIỆT NAM) */}
  <rect x="136" y="324" width="240" height="50" rx="14" fill="#fbbf24" stroke="#1f2937" stroke-width="12" />
  <text x="256" y="357" font-family="'Space Grotesk', sans-serif" font-weight="900" font-size="20" fill="#1f2937" text-anchor="middle" letter-spacing="2">DẤU ẤN HSK</text>

  {/* NGÔI SAO LẤP LÁNH NEO-BRUTALISM */}
  <polygon points="420,70 432,98 460,102 438,120 444,148 420,132 396,148 402,120 380,102 408,98" fill="#facc15" stroke="#1f2937" stroke-width="10" />
</svg>
