<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" shape-rendering="crispEdges">
  {/* Nền Thẻ Neo-Brutalism Bo Góc Vàng Hổ Phách */}
  <rect x="16" y="16" width="480" height="480" rx="64" fill="#fbbf24" stroke="#1f2937" stroke-width="24" />
  
  {/* Viền Trong Nền Trắng Kem */}
  <rect x="44" y="44" width="424" height="424" rx="48" fill="#fffaf0" stroke="#1f2937" stroke-width="16" />

  {/* DẤU ẤN ĐỎ HOÀNG GIA (IMPERIAL SEAL STAMP) */}
  <rect x="96" y="96" width="320" height="320" rx="36" fill="#e11d48" stroke="#1f2937" stroke-width="20" />
  {/* Viền Nối Đôi Cổ Phong */}
  <rect x="116" y="116" width="280" height="280" rx="24" fill="none" stroke="#fef2f2" stroke-width="10" stroke-dasharray="24,12" />

  {/* KHUNG CON DẤU VĂN TỰ TRUNG HOA (CHỮ HÁN: 蘭 薇 - LAN VY) */}
  {/* Chữ 蘭 (Lan) - Bên trái con dấu */}
  <g fill="#ffffff" stroke="#1f2937" stroke-width="6">
    {/* Bộ thảo & nét hoa văn dấu ấn Lan */}
    <rect x="150" y="150" width="70" height="16" rx="4" />
    <rect x="162" y="140" width="14" height="32" rx="3" />
    <rect x="190" y="140" width="14" height="32" rx="3" />
    
    <rect x="150" y="178" width="70" height="14" rx="3" />
    <rect x="150" y="198" width="32" height="40" rx="4" />
    <rect x="188" y="198" width="32" height="40" rx="4" />
    <rect x="150" y="244" width="70" height="14" rx="3" />
  </g>

  {/* Chữ 薇 (Vy) - Bên phải con dấu */}
  <g fill="#ffffff" stroke="#1f2937" stroke-width="6">
    {/* Bộ thảo & nét hoa văn dấu ấn Vy */}
    <rect x="290" y="150" width="72" height="16" rx="4" />
    <rect x="302" y="140" width="14" height="32" rx="3" />
    <rect x="334" y="140" width="14" height="32" rx="3" />

    <rect x="290" y="178" width="30" height="36" rx="3" />
    <rect x="326" y="178" width="36" height="36" rx="3" />
    <rect x="290" y="222" width="72" height="14" rx="3" />
    <rect x="306" y="242" width="40" height="20" rx="4" />
  </g>

  {/* BANNER DẤU ẤN LAN VY (VIỆT NAM + HSK) */}
  <rect x="136" y="284" width="240" height="56" rx="16" fill="#fbbf24" stroke="#1f2937" stroke-width="14" />
  <text x="256" y="322" font-family="'Space Grotesk', sans-serif" font-weight="900" font-size="24" fill="#1f2937" text-anchor="middle" letter-spacing="2">DẤU ẤN LAN VY</text>

  {/* TRÁI TIM PIXEL & NỐT THẮNG HSK */}
  <path d="M256 160 C246 140, 220 140, 220 160 C220 180, 256 205, 256 205 C256 205, 292 180, 292 160 C292 140, 266 140, 256 160 Z" fill="#f43f5e" stroke="#1f2937" stroke-width="8" />

  {/* HUY HIỆU GỐC TRÊN: HSK ATELIER */}
  <rect x="186" y="360" width="140" height="32" rx="8" fill="#ffffff" stroke="#1f2937" stroke-width="10" />
  <text x="256" y="382" font-family="monospace" font-weight="900" font-size="14" fill="#ef4444" text-anchor="middle" letter-spacing="1">HSK ATELIER</text>

  {/* NGÔI SAO LẤP LÁNH NEO-BRUTALISM */}
  <polygon points="420,70 432,98 460,102 438,120 444,148 420,132 396,148 402,120 380,102 408,98" fill="#facc15" stroke="#1f2937" stroke-width="10" />
</svg>
